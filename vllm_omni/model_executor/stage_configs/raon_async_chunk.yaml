# Stage config for Raon 2-stage pipeline with async chunk streaming.
# Stage 0: AR text generation + codec code prediction (Raon talker).
# Stage 1: Audio decode (codec codes -> waveform) via Mimi; per-window streaming.

async_chunk: true
stage_args:
  - stage_id: 0
    stage_type: llm
    runtime:
      devices: "0"
      max_batch_size: 6
    engine_args:
      model_stage: ar
      model_arch: RaonModel
      worker_type: ar
      scheduler_cls: vllm_omni.core.sched.omni_ar_scheduler.OmniARScheduler
      enforce_eager: true
      trust_remote_code: true
      gpu_memory_utilization: 0.7
      max_model_len: 16384
      engine_output_type: payload
      distributed_executor_backend: "mp"
      enable_prefix_caching: false
      max_num_batched_tokens: 32768
      max_num_seqs: 6
      tensor_parallel_size: 1
      async_scheduling: false
      custom_process_next_stage_input_func: vllm_omni.model_executor.stage_input_processors.raon.stage0_to_stage1_async_chunk
    output_connectors:
      to_stage_1: connector_of_shared_memory
    final_output: true
    final_output_type: text
    is_comprehension: true
    default_sampling_params:
      temperature: 0.7
      top_k: 20
      top_p: 0.8
      max_tokens: 2048
      seed: 42
      detokenize: true
    task_sampling_params:
      stt:
        temperature: 0.2
        top_k: 20
        top_p: 0.8
      tts:
        temperature: 1.2
        top_k: 20
        top_p: 0.8
      speechqa:
        temperature: 0.7
        top_k: 20
        top_p: 0.8
      spokenqa:
        temperature: 0.7
        top_k: 20
        top_p: 0.8
      textqa:
        temperature: 0.7
        top_k: 20
        top_p: 0.8

  - stage_id: 1
    stage_type: llm
    runtime:
      devices: "0"
    engine_args:
      model_stage: codec2wav
      model_arch: RaonCode2WavModel
      hf_config_name: audio_tokenizer_config
      worker_type: generation
      scheduler_cls: vllm_omni.core.sched.omni_generation_scheduler.OmniGenerationScheduler
      enforce_eager: true
      trust_remote_code: true
      gpu_memory_utilization: 0.2
      max_model_len: 8000
      async_scheduling: false
      enable_prefix_caching: false
      engine_output_type: audio
      distributed_executor_backend: "mp"
      max_num_batched_tokens: 32768
      max_num_seqs: 6
    engine_input_source: [0]
    input_connectors:
      from_stage_0: connector_of_shared_memory
    # NOTE: No `custom_process_input_func` here — peer async_chunk pattern.
    # The connector's chunk_transfer_adapter drives per-window prompt updates.
    final_output: true
    final_output_type: audio
    default_sampling_params:
      temperature: 0.0
      top_p: 1.0
      top_k: -1
      max_tokens: 65536
      seed: 42
      detokenize: true

runtime:
  enabled: true
  defaults:
    window_size: -1
    max_inflight: 1

  connectors:
    connector_of_shared_memory:
      name: SharedMemoryConnector
      extra:
        shm_threshold_bytes: 65536
        codec_streaming: true
        connector_get_sleep_s: 0.01
        connector_get_max_wait_first_chunk: 3000
        connector_get_max_wait: 300
        codec_chunk_frames: 25
        codec_left_context_frames: 25

  edges:
    - from: 0
      to: 1
      window_size: -1
