# Stage config for Raon 2-stage pipeline, optimized for CI e2e tests.
# Stage 0: AR text generation + codec payload emission.
# Stage 1: Mimi decode (codec codes -> waveform).

# The following config has been verified on 1x GPU (single-device CI).
# This config is optimized for CI e2e tests with conservative memory settings.
stage_args:
  - stage_id: 0
    stage_type: llm
    runtime:
      devices: "0"
      max_batch_size: 1
    engine_args:
      model_stage: ar
      model_arch: RaonModel
      worker_type: ar
      scheduler_cls: vllm_omni.core.sched.omni_ar_scheduler.OmniARScheduler
      enforce_eager: true
      trust_remote_code: false
      # Keep stage0 within CI GPU memory budget.
      gpu_memory_utilization: 0.55
      max_model_len: 3072
      # Payload mode skips hidden-state CPU export and forwards codec payloads only.
      engine_output_type: payload
      distributed_executor_backend: "mp"
      enable_prefix_caching: false
      # Keep startup profiling footprint small.
      max_num_batched_tokens: 2048
      max_num_seqs: 1
      tensor_parallel_size: 1
      speculative_config: null
      async_scheduling: false
    final_output: true
    final_output_type: text
    is_comprehension: true
    default_sampling_params:
      temperature: 1.2
      top_p: 0.8
      top_k: 20
      max_tokens: 512
      seed: 42
      detokenize: true

  - stage_id: 1
    stage_type: llm
    runtime:
      devices: "0"
      max_batch_size: 1
    engine_args:
      model_stage: codec2wav
      model_arch: RaonModel
      hf_config_name: audio_tokenizer_config
      worker_type: generation
      scheduler_cls: vllm_omni.core.sched.omni_generation_scheduler.OmniGenerationScheduler
      enforce_eager: true
      trust_remote_code: false
      gpu_memory_utilization: 0.12
      # Must not exceed the derived max_model_len from the model's
      # `audio_tokenizer_config` (often 8000 for this family).
      max_model_len: 8000
      async_scheduling: false
      enable_prefix_caching: false
      engine_output_type: audio
      distributed_executor_backend: "mp"
      max_num_batched_tokens: 32768
      max_num_seqs: 1
      tensor_parallel_size: 1
    engine_input_source: [0]
    custom_process_input_func: vllm_omni.model_executor.stage_input_processors.raon.stage0_to_stage1
    final_output: true
    final_output_type: audio
    default_sampling_params:
      temperature: 0.0
      top_p: 1.0
      top_k: -1
      max_tokens: 65536
      seed: 42
      detokenize: true
